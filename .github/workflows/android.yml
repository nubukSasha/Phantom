name: Build Phantom APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── JDK 21 ──
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      # ── Android SDK + NDK ──
      - uses: android-actions/setup-android@v3
      - name: Install NDK & platform
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653" 2>&1 | tail -20

      # ── Rust toolchain ──
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

      # ── Install cargo helpers ──
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
        env:
          CARGO_NET_RETRY: 5

      # ── Build native libraries ──
      - name: Build phantom_ffi (arm64-v8a)
        working-directory: ffi
        run: cargo ndk --target aarch64-linux-android --platform 28 build --release

      - name: Build phantom_ffi (armeabi-v7a)
        working-directory: ffi
        run: cargo ndk --target armv7-linux-androideabi --platform 28 build --release

      - name: Build phantom_ffi (x86_64)
        working-directory: ffi
        run: cargo ndk --target x86_64-linux-android --platform 28 build --release

      # ── Stage .so files ──
      - name: Copy .so to jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          cp ffi/target/aarch64-linux-android/release/libphantom_ffi.so  app/src/main/jniLibs/arm64-v8a/
          cp ffi/target/armv7-linux-androideabi/release/libphantom_ffi.so app/src/main/jniLibs/armeabi-v7a/
          cp ffi/target/x86_64-linux-android/release/libphantom_ffi.so   app/src/main/jniLibs/x86_64/

      # ── Generate Kotlin bindings from compiled library ──
      - name: Generate UniFFI Kotlin bindings
        run: |
          mkdir -p /tmp/uniffi-gen/src
          cat > /tmp/uniffi-gen/Cargo.toml << 'CARGOEOF'
          [package]
          name = "uniffi-gen"
          version = "0.1.0"
          edition = "2021"
          [dependencies]
          uniffi_bindgen = "=0.28.1"
          camino = "1"
          CARGOEOF
          cat > /tmp/uniffi-gen/src/main.rs << 'RUSTEOF'
          use camino::Utf8Path;
          fn main() {
              let mut a = std::env::args().skip(1);
              let lib = a.next().expect("usage: gen <lib.so> <out> <cfg>");
              let out = a.next().expect("usage: gen <lib.so> <out> <cfg>");
              let cfg = a.next().expect("usage: gen <lib.so> <out> <cfg>");
              uniffi_bindgen::library_mode::generate_bindings(
                  Utf8Path::new(&lib), None,
                  &uniffi_bindgen::bindings::kotlin::KotlinBindingGenerator,
                  &uniffi_bindgen::EmptyCrateConfigSupplier,
                  Some(Utf8Path::new(&cfg)),
                  Utf8Path::new(&out), true,
              ).expect("generate_bindings failed");
          }
          RUSTEOF
          cargo run --release --manifest-path /tmp/uniffi-gen/Cargo.toml -- \
            ffi/target/aarch64-linux-android/release/libphantom_ffi.so \
            app/src/main/kotlin \
            ffi/uniffi.toml

      # ── Build Android APK ──
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"
      - name: Build debug APK
        run: gradle assembleDebug

      # ── Upload artifact ──
      - uses: actions/upload-artifact@v4
        with:
          name: phantom-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
